  const ua = navigator.userAgent || '';
  return {
    isIOS:    /iPhone|iPad|iPod/.test(ua),
    isAndroid:/Android/.test(ua),
    isLine:   /Line/i.test(ua),
    isFB:     /FBAV|FBAN|FB_IAB/i.test(ua),
    get isInApp() { return this.isLine || this.isFB; },
  };
}

// Wikipedia REST API thumbnail fetch（依序嘗試 wikiTitles）
async function fetchWikiThumbnail(titles) {
  for (const title of titles) {
    try {
      const res = await fetch(
        `https://en.wikipedia.org/api/rest_v1/page/summary/${title}`,
        { headers: { 'Accept': 'application/json' } }
      );
      if (!res.ok) continue;
      const data = await res.json();
      // thumbnail.source 是原始 infobox 圖，originalimage.source 是全解析度版
      const src = data?.thumbnail?.source || data?.originalimage?.source;
      if (src) return src;
    } catch {}
  }
  return null;
}

// ── 蛇種照片卡片（動態 fetch Wikipedia thumbnail）───────────
function SnakeCard({ snake, selected, onClick }) {
  const [imgSrc, setImgSrc]     = useState(null);   // null=loading, ''=failed
  const [imgLoaded, setImgLoaded] = useState(false);
  const isSelected = selected?.id === snake.id;

  useEffect(() => {
    let cancelled = false;
    fetchWikiThumbnail(snake.wikiTitles).then(src => {
      if (!cancelled) setImgSrc(src || '');
    });
    return () => { cancelled = true; };
  }, [snake.id]);

  const showSkeleton = imgSrc === null || (imgSrc && !imgLoaded);
  const showEmoji    = imgSrc === '';

  return (
    <button
      onClick={onClick}
      className={`rounded-xl border-2 overflow-hidden transition-all text-left w-full focus:outline-none
        ${isSelected
          ? `${snake.border} shadow-lg scale-105 ring-2 ring-offset-1 ring-red-400`
          : `border-gray-200 hover:border-gray-300 hover:shadow-md`}
      `}
    >
      {/* 照片區 */}
      <div className="relative w-full" style={{aspectRatio:'4/3', background:'#1c1c1e'}}>
        {showSkeleton && <div className="absolute inset-0 skeleton"/>}

        {imgSrc && !showEmoji && (
          <img
            src={imgSrc}
            alt={snake.name}
            className="w-full h-full object-cover absolute inset-0"
            style={{ opacity: imgLoaded ? 1 : 0, transition: 'opacity 0.35s' }}
            onLoad={() => setImgLoaded(true)}
            onError={() => setImgSrc('')}
          />
        )}

        {showEmoji && (
          <div className={`w-full h-full flex items-center justify-center text-5xl ${snake.bg}`}>🐍</div>
        )}

        {isSelected && <div className="absolute inset-0 bg-red-500/15 pointer-events-none"/>}
      </div>

      {/* 文字區 */}
      <div className={`px-3 py-2 ${isSelected ? snake.bg : 'bg-white'}`}>
        <p className={`font-bold text-sm leading-tight ${snake.textDark && isSelected ? 'text-zinc-100' : 'text-gray-800'}`}>
          {snake.name}
        </p>
        <span className={`inline-block text-[11px] px-1.5 py-0.5 rounded mt-0.5
          ${isSelected ? snake.badge : 'bg-gray-100 text-gray-500'}`}>
          {snake.type}血清
        </span>
      </div>
    </button>
  );
}

const DISTRICT_LABELS = { '茂林區': '高雄市茂林區' };

function ManualPicker({ onSelect }) {
  const [sel, setSel] = useState('');
  const confirm = () => {
    const d = PINGTUNG_DISTRICTS.find(d => d.name === sel);
    if (d) {
      const label = DISTRICT_LABELS[d.name] || ('屏東縣' + d.name);
      onSelect({ lat: d.lat, lng: d.lng, label });
    }
  };
  return (
    <div className="slide-down bg-amber-50 border border-amber-200 rounded-xl p-4 space-y-3">
      <p className="font-bold text-amber-800 text-sm flex items-center gap-1.5">
        <IcoPin s={15}/> 手動選擇您所在的鄉鎮市區
      </p>
      <select value={sel} onChange={e => setSel(e.target.value)}
        className="w-full border border-gray-300 rounded-lg px-3 py-3 text-base bg-white focus:outline-none focus:ring-2 focus:ring-amber-400">
        <option value="">— 請選擇鄉鎮市區 —</option>
        {PINGTUNG_DISTRICTS.map(d => <option key={d.name} value={d.name}>{d.name}</option>)}
      </select>
      <button onClick={confirm} disabled={!sel}
        className="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-gray-300 text-white font-bold py-3 rounded-lg text-sm transition-colors">
        確認位置，搜尋最近醫院
      </button>
    </div>
  );
}

// ── InApp 警告 ────────────────────────────────────────────────
function InAppWarning({ platform }) {
  const copy = () => {
    const url = window.location.href;
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => alert('✅ 已複製！請在 Safari 或 Chrome 貼上開啟。'));
    else prompt('請複製網址：', url);
  };
  return (
    <div className="bg-orange-50 border-2 border-orange-400 rounded-xl p-4 space-y-3 slide-down">
      <p className="font-bold text-orange-800 flex items-center gap-2"><IcoAlert s={18}/>{platform.isLine ? 'LINE' : 'FB'} 內建瀏覽器無法定位</p>
      <div className="bg-white rounded-lg p-3 border border-orange-200 text-sm text-gray-700">
        {platform.isIOS
          ? <ol className="list-decimal list-inside space-y-1"><li>點右下角「⋯」</li><li>選「在 Safari 中開啟」</li><li>重新點定位按鈕</li></ol>
          : <ol className="list-decimal list-inside space-y-1"><li>點右上角「⋮」</li><li>選「在 Chrome 開啟」</li><li>重新點定位按鈕</li></ol>}
      </div>
      <button onClick={copy} className="w-full bg-orange-500 text-white font-bold py-2.5 rounded-lg text-sm">複製網址 → 外部瀏覽器貼上開啟</button>
    </div>
  );
}

      </div>
      <button onClick={onRetry} className="w-full bg-red-600 text-white font-bold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2">
        <IcoRefresh s={15}/> 我已開啟，重新定位
      </button>
    </div>
  );
}

// ── 定位元件 ─────────────────────────────────────────────────
function LocationSection({ onLocUpdate }) {
  const [locState, setLocState] = useState('idle');
  const [locLabel, setLocLabel] = useState('');
  const [showManual, setShowManual] = useState(false);
  const watchRef = useRef(null);
  const platform = useMemo(() => detectPlatform(), []);

  useEffect(() => {
    if (platform.isInApp) setLocState('inapp');
    return () => stopWatch();
  }, []);

  const stopWatch = () => {
    if (watchRef.current !== null) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; }
  };

  const startLocating = () => {
    if (navigator.geolocation) {
      // 裝置支援定位：進入請求狀態並開始 watchPosition
      setLocState('requesting'); setShowManual(false); stopWatch();
      watchRef.current = navigator.geolocation.watchPosition(
        (pos) => {
          // 成功取得位置：停止監聽，更新座標
          stopWatch();
          onLocUpdate({ lat: pos.coords.latitude, lng: pos.coords.longitude });
          setLocLabel(''); setLocState('success');
        },
        (err) => {
          // 失敗：判斷是「權限被拒」還是其他錯誤
          stopWatch();
          const isDenied = err.code === err.PERMISSION_DENIED ||
            (err.message||'').toLowerCase().includes('permission') ||
            (err.message||'').toLowerCase().includes('policy');
          if (isDenied) setLocState('denied');
          else { setLocState('failed'); setShowManual(true); }
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
      );
    } else {
      // 裝置不支援地理位置功能
      alert('Sorry，您的裝置不支援地理位置功能。');
      setLocState('failed'); setShowManual(true);
    }
  };

  const handleManualSelect = (loc) => {
    stopWatch(); onLocUpdate({ lat: loc.lat, lng: loc.lng });
    setLocLabel(loc.label); setLocState('success'); setShowManual(false);
  };

  const reset = () => {
    stopWatch(); setLocState('idle'); setLocLabel('');
    setShowManual(false); onLocUpdate(null);
  };

  if (locState === 'inapp') return (
    <div className="space-y-4">
      <InAppWarning platform={platform}/>
      <button onClick={() => setShowManual(v => !v)} className="text-sm text-amber-600 underline w-full text-center">
        {showManual ? '▲ 收起' : '▼ 或改用手動選擇鄉鎮市區'}
      </button>
      {showManual && <ManualPicker onSelect={handleManualSelect}/>}
    </div>
  );

  if (locState === 'denied') return (
    <div className="space-y-4">
      <DeniedGuide platform={platform} onRetry={() => { setLocState('idle'); startLocating(); }}/>
      <button onClick={() => setShowManual(v => !v)} className="text-sm text-amber-600 underline w-full text-center">
        {showManual ? '▲ 收起' : '▼ 或改用手動選擇鄉鎮市區'}
      </button>
      {showManual && <ManualPicker onSelect={handleManualSelect}/>}
    </div>
  );

  if (locState === 'requesting') return (
    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 space-y-3 slide-down">
      <div className="flex items-center gap-3">
        <div className="pulse-dot"/>
        <div>
          <p className="font-bold text-blue-800">定位中，請稍候…</p>
          <p className="text-xs text-blue-600 mt-0.5">手機若出現詢問視窗，請點「<strong>允許</strong>」</p>
        </div>
      </div>
      <p className="text-xs text-blue-700 bg-blue-100 rounded-lg px-3 py-2">
        📍 位置僅用於排序最近的醫院，不會上傳或儲存。
      </p>
      <button onClick={reset} className="text-xs text-gray-400 underline">取消</button>
    </div>
  );

  if (locState === 'success') return (
    <div className="bg-green-50 border border-green-200 rounded-xl p-4 slide-down flex items-start gap-3">
      <span className="text-green-500 text-xl mt-0.5">✅</span>
      <div>
        <p className="font-bold text-green-800">{locLabel ? `位置：${locLabel}` : 'GPS 位置已取得'}</p>
        <button onClick={reset} className="text-xs text-green-700 underline mt-1">重新定位</button>
      </div>
    </div>
  );

  if (locState === 'failed') return (
    <div className="space-y-4">
      <div className="bg-red-50 border border-red-200 rounded-xl p-4 slide-down">
        <p className="font-bold text-red-700 flex items-center gap-2 mb-2"><IcoAlert s={16}/> 定位失敗</p>
        <p className="text-xs text-red-600 mb-3">GPS 訊號弱或裝置不支援，請改用下方手動選擇。</p>
        <button onClick={startLocating} className="bg-red-600 text-white text-sm px-4 py-2 rounded-lg font-bold flex items-center gap-1.5">
          <IcoRefresh s={14}/> 重新嘗試
        </button>
      </div>
      <ManualPicker onSelect={handleManualSelect}/>
    </div>
  );

  // idle
  return (
    <div className="space-y-4">
      <p className="text-sm text-blue-800 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2.5 flex items-start gap-2">
        <IcoInfo s={16} c="mt-0.5 flex-shrink-0"/>
        定位用於<strong>計算您與各醫院的距離</strong>，以排序出最近的醫院。位置不會上傳或儲存。
      </p>
      <div className="flex flex-col gap-3">
        <button onClick={startLocating}
          className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white px-6 py-4 rounded-xl font-bold text-base shadow-md transition-all">
          <IcoPin s={22}/> 📍 GPS 定位（推薦）
        </button>
        <button onClick={() => setShowManual(v => !v)}
          className="flex items-center justify-center gap-2 bg-amber-50 hover:bg-amber-100 border border-amber-300 text-amber-800 px-6 py-3 rounded-xl font-bold text-sm transition-all">
          <IcoPin s={18}/> 手動選擇鄉鎮市區
        </button>
      </div>
      {showManual && <ManualPicker onSelect={handleManualSelect}/>}
    </div>
  );
}

// ── 主 App ────────────────────────────────────────────────────
function App() {
  const [hospitals, setHospitals] = useState(DEFAULT_HOSPITALS);
  const [userLoc, setUserLoc] = useState(null);
  const [selectedSnake, setSelectedSnake] = useState(null);

  const calcDist = (la1,lo1,la2,lo2) => {
    const R=6371, dL=(la2-la1)*Math.PI/180, dO=(lo2-lo1)*Math.PI/180;
    const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  };

  const handleFile = e => {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); if(Array.isArray(d)){setHospitals(d);alert('已載入 '+d.length+' 筆');}} catch{alert('JSON 解析失敗');} };
    r.readAsText(f);
  };

  const filtered = useMemo(() => {
    if (!selectedSnake) return [];
    let list = hospitals.filter(h => h.serums.includes(selectedSnake.type));
    if (userLoc) list = list.map(h=>({...h,distance:calcDist(userLoc.lat,userLoc.lng,h.lat,h.lng)})).sort((a,b)=>a.distance-b.distance);
    return list;
  }, [hospitals, selectedSnake, userLoc]);

  return (
    <div className="min-h-screen pb-16">
      <header className="bg-red-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div className="max-w-3xl mx-auto flex justify-between items-center">
          <h1 className="text-lg sm:text-xl font-bold flex items-center gap-2">
            <IcoAlert s={22}/> 毒蛇血清急救醫院快搜
          </h1>
          <label className="cursor-pointer bg-red-700 hover:bg-red-800 px-3 py-1.5 rounded text-sm flex items-center gap-1 transition-colors">
            <IcoUpload s={15}/>
            <span className="hidden sm:inline">上傳資料</span>
            <input type="file" accept=".json" className="hidden" onChange={handleFile}/>
          </label>
        </div>
      </header>

      <main className="max-w-3xl mx-auto p-4 space-y-5">
        {/* 急救原則 */}
        <div className="bg-red-50 border-l-4 border-red-600 p-4 rounded-r-md">
          <div className="flex items-start gap-3">
            <IcoInfo c="text-red-600 mt-0.5 flex-shrink-0" s={20}/>
            <div>
              <p className="font-bold text-red-800">緊急處理原則</p>
              <ul className="text-sm text-red-700 mt-1 list-disc list-inside space-y-0.5">
                <li>保持冷靜，脫掉束縛物，<strong>【拍下】蛇的【照片】</strong>或將蛇帶至醫院。</li>
                <li><strong>【不要】</strong>冰敷、吸吮、切開傷口或束縛過緊。</li>
                <li>保持被咬部位<strong>【低於】</strong>心臟高度。</li>
                <li>盡速前往具備血清的醫院。危急請撥 <strong>【119】</strong>。</li>
              </ul>
            </div>
          </div>
        </div>

        {/* Step 1 */}
        <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
          <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
            <span className="bg-red-100 text-red-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">1</span>
            選擇咬傷您的毒蛇種類
          </h2>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
            {SNAKE_TYPES.map(snake => (
              <SnakeCard key={snake.id} snake={snake} selected={selectedSnake} onClick={() => setSelectedSnake(snake)}/>
            ))}
          </div>
          <p className="text-[10px] text-gray-400 mt-3 text-right">照片來源：Wikipedia，CC BY-SA 授權</p>
        </section>

        {/* Step 2 */}
        <section className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
          <h2 className="text-lg font-bold mb-4 flex items-center gap-2">
            <span className="bg-red-100 text-red-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">2</span>
            提供您的位置
          </h2>
          <LocationSection onLocUpdate={setUserLoc}/>
        </section>

        {/* Step 3 */}
        {selectedSnake && (
          <section>
            <h2 className="text-xl font-bold mb-4 flex items-center gap-2 flex-wrap">
              <span className="bg-red-100 text-red-600 w-6 h-6 rounded-full flex items-center justify-center text-sm font-bold">3</span>
              「{selectedSnake.type}」血清醫院
              <span className="text-sm text-gray-400 font-normal">（{filtered.length} 家）</span>
              {!userLoc && (
                <span className="text-xs text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full border border-amber-200">
                  提供位置後依距離排序
                </span>
              )}
            </h2>
            <div className="space-y-3">
              {filtered.length > 0 ? filtered.map((h,i) => (
                <div key={h.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 relative overflow-hidden">
                  {i===0 && userLoc && <div className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg">最近</div>}
                  <div className="flex justify-between items-start gap-2">
                    <div className="flex-grow min-w-0">
                      <p className="font-bold text-gray-800 leading-snug">{h.name}</p>
                      {h.distance!=null && <p className="text-blue-600 font-bold text-sm mt-0.5">📍 約 {h.distance.toFixed(1)} 公里</p>}
                      <p className="text-gray-400 text-xs mt-1">{h.address}</p>
                      <p className="text-gray-500 text-xs">{h.phone}</p>
                    </div>
                    <div className="flex gap-2 flex-shrink-0">
                      <a href={`tel:${h.phone}`} className="bg-green-500 hover:bg-green-600 text-white p-2.5 rounded-full shadow transition-colors"><IcoPhone s={18}/></a>
                      <a href={`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lng}`} target="_blank" className="bg-blue-500 hover:bg-blue-600 text-white p-2.5 rounded-full shadow transition-colors"><IcoNav s={18}/></a>
                    </div>
                  </div>
                </div>
              )) : (
                <div className="p-10 text-center bg-gray-100 rounded-xl text-gray-500">
                  查無符合血清的醫院<br/>
                  <span className="text-sm">請前往大型醫院或撥打 <strong>119</strong></span>
                </div>
              )}
            </div>
          </section>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

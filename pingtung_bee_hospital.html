<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>屏東縣蜜蜂螫傷急救醫院導航</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --red-dark: #A32D2D;
      --blue-light: #E6F1FB;
      --blue-dark: #185FA5;
      --gray-light: #F1EFE8;
      --gray-dark: #5F5E5A;
      --bg: #ffffff;
      --bg-secondary: #f7f6f3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6a65;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.28);
      --warning-bg: #FAEEDA;
      --warning-text: #854F0B;
      --warning-border: rgba(186,117,23,0.3);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --red: #f07070;
        --red-light: #3d1a1a;
        --red-dark: #f9b0b0;
        --blue-light: #0c2a45;
        --blue-dark: #85b7eb;
        --gray-light: #2c2c2a;
        --gray-dark: #b4b2a9;
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --text-primary: #f0ede8;
        --text-secondary: #908e89;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.3);
        --warning-bg: #2e1f08;
        --warning-text: #FAC775;
        --warning-border: rgba(250,199,117,0.25);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Helvetica Neue", sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .header-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--red); display: flex; align-items: center;
      justify-content: center; margin: 0 auto 12px;
    }
    .header-icon svg { width: 28px; height: 28px; fill: white; }
    .header h1 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .header p { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

    /* Alert banner */
    .alert-banner {
      background: var(--red-light);
      border: 0.5px solid rgba(226,75,74,0.35);
      border-radius: var(--radius-lg);
      padding: 0.875rem 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .alert-banner svg { width: 18px; height: 18px; fill: var(--red-dark); flex-shrink: 0; margin-top: 1px; }
    .alert-banner p { font-size: 13px; color: var(--red-dark); line-height: 1.6; }
    .alert-banner strong { font-weight: 600; }

    /* Locate button */
    #locate-btn {
      width: 100%; padding: 14px;
      background: var(--red); color: white; border: none;
      border-radius: var(--radius-lg); font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    #locate-btn:hover { opacity: 0.88; }
    #locate-btn:active { transform: scale(0.98); }
    #locate-btn:disabled { opacity: 0.5; cursor: default; }
    #locate-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }

    #status {
      font-size: 13px; color: var(--text-secondary);
      text-align: center; margin-top: 10px; min-height: 20px;
      line-height: 1.5;
    }

    /* Results */
    #results { margin-top: 1.5rem; display: none; }
    .section-label {
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
      letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px;
    }

    /* Hospital card */
    .hospital-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.125rem;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      display: block;
    }
    .hospital-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .hospital-card:active { transform: scale(0.99); }
    .hospital-card.nearest {
      border: 1.5px solid var(--red);
    }

    .nearest-label {
      font-size: 11px; font-weight: 600; color: var(--red-dark);
      display: flex; align-items: center; gap: 4px; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .nearest-label svg { width: 12px; height: 12px; fill: var(--red-dark); }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .card-name { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.4; }

    .badge {
      font-size: 11px; font-weight: 500; padding: 3px 9px;
      border-radius: 99px; flex-shrink: 0; margin-top: 2px;
    }
    .badge-heavy { background: var(--red-light); color: var(--red-dark); }
    .badge-mid { background: var(--blue-light); color: var(--blue-dark); }
    .badge-normal { background: var(--gray-light); color: var(--gray-dark); }

    .card-addr {
      font-size: 13px; color: var(--text-secondary); margin-top: 5px; line-height: 1.5;
    }

    .phone-row { display: flex; align-items: center; margin-top: 5px; }
    .phone-link {
      font-size: 13px; color: var(--blue-dark); text-decoration: none;
      display: flex; align-items: center; gap: 4px;
    }
    .phone-link:hover { text-decoration: underline; }

    .card-bottom {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding-top: 10px;
      border-top: 0.5px solid var(--border);
    }
    .card-dist { font-size: 13px; color: var(--text-secondary); }
    .card-dist strong { color: var(--text-primary); font-weight: 600; }

    .nav-btn {
      font-size: 13px; color: var(--red); background: none; border: none;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      text-decoration: none; font-family: inherit; font-weight: 500;
      padding: 6px 12px; border-radius: var(--radius-md);
      background: var(--red-light); transition: opacity 0.15s;
    }
    .nav-btn:hover { opacity: 0.8; }
    .nav-btn svg { width: 14px; height: 14px; fill: var(--red); }

    .divider {
      border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0;
    }

    /* Tip box */
    .tip-box {
      background: var(--warning-bg);
      border: 0.5px solid var(--warning-border);
      border-radius: var(--radius-md);
      padding: 0.875rem 1rem;
      font-size: 13px; color: var(--warning-text); line-height: 1.7;
    }
    .tip-box strong { font-weight: 600; }

    /* Emergency call */
    .emergency-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 1.25rem;
    }
    .emergency-btn {
      flex: 1; padding: 12px; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 14px; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .emergency-btn:hover { opacity: 0.85; }
    .btn-119 { background: var(--red); color: white; }
    .btn-1922 { background: var(--bg); color: var(--text-primary); border: 0.5px solid var(--border); }
    .emergency-btn svg { width: 16px; height: 16px; }
    .btn-119 svg { fill: white; }
    .btn-1922 svg { fill: var(--text-primary); }

    /* Footer */
    .footer {
      text-align: center; font-size: 12px; color: var(--text-secondary);
      margin-top: 2rem; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <h1>蜜蜂螫傷急救導航</h1>
      <p>屏東縣急救責任醫院 · 14 間醫院</p>
    </div>

    <div class="alert-banner">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <p>若出現<strong>呼吸困難、臉部腫脹、暈眩、全身蕁麻疹</strong>等過敏反應，請立即撥打 119，勿自行開車就醫。</p>
    </div>

    <div class="emergency-row">
      <a href="tel:119" class="emergency-btn btn-119">
        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        撥打 119
      </a>
      <a href="tel:1922" class="emergency-btn btn-1922">
        <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        撥打 1922
      </a>
    </div>

    <button id="locate-btn" onclick="locateMe()">
      <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
      取得目前位置，尋找最近醫院
    </button>
    <div id="status"></div>

    <div id="results"></div>

    <hr class="divider">

    <div class="tip-box">
      <strong>螫傷緊急處置建議：</strong><br>
      1. 用信用卡或指甲輕刮移除毒刺，勿用手指夾出。<br>
      2. 以流動清水沖洗患部 10 分鐘。<br>
      3. 冰敷患部減輕腫痛。<br>
      4. 若螫刺超過 10 針、或有過敏史，請立即就醫。
    </div>

    <div class="footer">
      資料來源：屏東縣政府衛生局<br>
      急救責任醫院分布表（共 14 間）
    </div>

  </div>

  <script>
    const HOSPITALS = [
      { name: "衛生福利部屏東醫院", addr: "屏東市自由路270號", tel: "08-7363011", level: "中度", lat: 22.6736, lng: 120.4863 },
      { name: "屏東基督教醫院", addr: "屏東市大連路60號", tel: "08-7368686", level: "中度", lat: 22.6701, lng: 120.4817 },
      { name: "國仁醫院", addr: "屏東市民生東路12-2號", tel: "08-7223000", level: "中度", lat: 22.6720, lng: 120.4942 },
      { name: "寶建醫院", addr: "屏東市中山路123號", tel: "08-7665995", level: "中度", lat: 22.6688, lng: 120.4870 },
      { name: "國軍高雄總醫院屏東分院", addr: "屏東市大湖路58巷22號", tel: "08-7350756", level: "一般", lat: 22.6524, lng: 120.4745 },
      { name: "大新醫院", addr: "屏東縣高樹鄉長榮村興中路208號", tel: "08-7960833", level: "一般", lat: 22.7891, lng: 120.5783 },
      { name: "高雄榮民總醫院屏東分院", addr: "屏東縣內埔鄉龍潭村昭勝路安平1巷1號", tel: "08-7704115", level: "一般", lat: 22.6168, lng: 120.5601 },
      { name: "安泰醫院", addr: "屏東縣東港鎮中正路一段210號", tel: "08-8329966", level: "重度", lat: 22.4625, lng: 120.4498 },
      { name: "輔英醫院", addr: "屏東縣東港鎮中山路5號", tel: "08-8323146", level: "中度", lat: 22.4668, lng: 120.4537 },
      { name: "枋寮醫院", addr: "屏東縣枋寮鄉中山路139號", tel: "08-8789991", level: "中度", lat: 22.3638, lng: 120.5898 },
      { name: "潮州安泰醫院", addr: "屏東縣潮州鎮四維路162號", tel: "08-7800888", level: "一般", lat: 22.5535, lng: 120.5452 },
      { name: "衛生福利部恆春旅遊醫院", addr: "屏東縣恆春鎮恆南路188號", tel: "08-8892704", level: "一般", lat: 22.0013, lng: 120.7453 },
      { name: "南門醫院", addr: "屏東縣恆春鎮南門路10號", tel: "08-8894568", level: "一般", lat: 22.0021, lng: 120.7441 },
      { name: "恆春基督教醫院", addr: "屏東縣恆春鎮恆西路21號", tel: "08-8892293", level: "一般", lat: 22.0035, lng: 120.7389 }
    ];

    function deg2rad(deg) { return deg * (Math.PI / 180); }

    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = deg2rad(lat2 - lat1);
      const dLng = deg2rad(lng2 - lng1);
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
        Math.sin(dLng/2) * Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function levelBadge(level) {
      if (level === "重度") return 'badge-heavy';
      if (level === "中度") return 'badge-mid';
      return 'badge-normal';
    }

    function mapsUrl(h, userLat, userLng) {
      return `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLng}&destination=${encodeURIComponent(h.name + ' ' + h.addr)}&travelmode=driving`;
    }

    function locateMe() {
      const btn = document.getElementById('locate-btn');
      const status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = '正在取得位置，請稍候...';

      if (!navigator.geolocation) {
        status.textContent = '您的瀏覽器不支援定位功能，顯示完整醫院列表。';
        btn.disabled = false;
        showAllHospitals();
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude: lat, longitude: lng } = pos.coords;
          status.textContent = `定位成功 (${lat.toFixed(4)}, ${lng.toFixed(4)})`;
          showResults(lat, lng);
          btn.disabled = false;
        },
        (err) => {
          let msg = '無法取得位置';
          if (err.code === 1) msg = '位置存取被拒絕，請允許定位權限後重試。';
          else if (err.code === 3) msg = '定位逾時，請確認 GPS 已開啟。';
          status.textContent = msg + ' 顯示完整醫院列表。';
          btn.disabled = false;
          showAllHospitals();
        },
        { timeout: 12000, enableHighAccuracy: true }
      );
    }

    function renderCard(h, index, showDist, userLat, userLng) {
      const isNearest = showDist && index === 0;
      const url = showDist
        ? mapsUrl(h, userLat, userLng)
        : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(h.name + ' ' + h.addr)}`;

      return `
        <a class="hospital-card ${isNearest ? 'nearest' : ''}" href="${url}" target="_blank" rel="noopener">
          ${isNearest ? `<div class="nearest-label">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
            最近醫院
          </div>` : ''}
          <div class="card-top">
            <div class="card-name">${h.name}</div>
            <span class="badge ${levelBadge(h.level)}">${h.level}</span>
          </div>
          <div class="card-addr">${h.addr}</div>
          <div class="phone-row">
            <a class="phone-link" href="tel:${h.tel.replace(/-/g,'')}" onclick="event.stopPropagation()">
              ☎ ${h.tel}
            </a>
          </div>
          <div class="card-bottom">
            <div class="card-dist">
              ${showDist ? `距離約 <strong>${h.dist.toFixed(1)} 公里</strong>` : '點擊查看地圖'}
            </div>
            <span class="nav-btn">
              <svg viewBox="0 0 24 24"><path d="M21.71 11.29l-9-9a1 1 0 0 0-1.42 0l-9 9a1 1 0 0 0 0 1.42l9 9a1 1 0 0 0 1.42 0l9-9a1 1 0 0 0 0-1.42zM14 14.5V12h-4v3H8v-4a1 1 0 0 1 1-1h5V7.5l3.5 3.5-3.5 3.5z"/></svg>
              ${showDist ? 'Google 導航' : '查看地圖'}
            </span>
          </div>
        </a>
      `;
    }

    function showResults(userLat, userLng) {
      const sorted = HOSPITALS.map(h => ({
        ...h,
        dist: getDistance(userLat, userLng, h.lat, h.lng)
      })).sort((a, b) => a.dist - b.dist);

      const el = document.getElementById('results');
      el.style.display = 'block';
      el.innerHTML = '<div class="section-label">距離排序 — 由近至遠</div>' +
        sorted.map((h, i) => renderCard(h, i, true, userLat, userLng)).join('');
    }

    function showAllHospitals() {
      const el = document.getElementById('results');
      el.style.display = 'block';
      el.innerHTML = '<div class="section-label">屏東縣急救責任醫院（共 14 間）</div>' +
        HOSPITALS.map((h, i) => renderCard(h, i, false, null, null)).join('');
    }
  </script>
</body>
</html>
